name: Update Notepad++ macOS cask

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

jobs:
  update:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Update cask from upstream release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./bin/update-notepad-plus-plus-macos

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/notepad-plus-plus-macos.rb
          git commit -m "chore(notepad-plus-plus-macos): bump cask"
          git push
